- title: "Secular decrease of wind power potential in India associated with warming in the Indian Ocean"
  image: Secular.jpg
  description: "On the basis of hourly wind data from an assimilated meteorology reanalysis dataset covering the 1980–2016 period, we show that wind power potential may have declined secularly over this interval, particularly in western India. Surface temperature data confirm that significant warming occurred in the Indian Ocean over the study period, leading to modulation of high pressure over the ocean. The warming in the Indian Ocean contributes to subsidence and dampening of upward motion over the Indian continent, resulting potentially in weakening of the monsoonal circulation and wind speeds over India."
